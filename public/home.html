<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flixora</title>
    <link rel = "stylesheet" href = "styles/style1.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Arimo:ital,wght@0,400..700;1,400..700&family=Lexend:wght@100..900&family=Zen+Dots&display=swap" rel="stylesheet">
</head>

<body>
  <main>
    <header>
        <div class="logo">Flixora</div>
    </header>
    <div class = "box">
    <div class = "text1">Discover your next favourite movie</div>
    <div class = "text2">no more endless scrolling. Tell us your vibe - we will find your film</div>
    </div>

    <div class="search-wrapper">
  <form class="search-bar" action="/find" method="POST">
    <span class="search-icon">🔍</span>
    <input
        name = "prompt"
        type="text"
        class="search-input"
        placeholder="I want a movie with time travel and romance..."
    />
    <button class="search-btn">
      <span class="send-icon">➤</span>
      Discover
    </button>
  </form>
    </div>
  <div class = "comment">
  <a href = "/trending">Whats trending ?</a>
  </div>
</main>

  <footer>© 2025 Flixora · All Rights Reserved 🎬</footer>
</body>
</html>
